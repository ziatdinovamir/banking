name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y lcov
    
    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=ON -DCOVERAGE=ON
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure
    
    - name: Collect coverage
      working-directory: build
      run: |
        lcov --capture --directory . --output-file coverage.info --ignore-errors unused
        lcov --remove coverage.info '/usr/*' '*/googletest/*' '*/gtest/*' '*/_deps/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info
    
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: build/coverage.info
        github-token: ${{ secrets.GITHUB_TOKEN }}
