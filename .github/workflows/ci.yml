name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure CMake
      shell: bash
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTS=ON
    
    - name: Build
      shell: bash
      run: cmake --build build --config ${{ matrix.build_type }}
    
    - name: Run tests
      working-directory: build
      shell: bash
      run: ctest -C ${{ matrix.build_type }} --output-on-failure

  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov
    
    - name: Configure CMake with coverage
      run: cmake -B build -DBUILD_TESTS=ON -DCOVERAGE=ON
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure
    
    - name: Collect coverage
      working-directory: build
      run: |
        lcov --capture --directory . --output-file coverage.info --ignore-errors unused
        lcov --remove coverage.info '/usr/*' '*/googletest/*' '*/tests/*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info
    
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: build/coverage.info
        github-token: ${{ secrets.GITHUB_TOKEN }}
