name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure CMake
      shell: bash
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTS=ON
    
    - name: Build
      shell: bash
      run: cmake --build build --config ${{ matrix.build_type }}
    
    - name: Run tests
      working-directory: build
      shell: bash
      run: ctest -C ${{ matrix.build_type }} --output-on-failure

  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov
    
    - name: Configure CMake with coverage
      run: cmake -B build -DBUILD_TESTS=ON -DCOVERAGE=ON \
            -DCMAKE_CXX_FLAGS="--coverage -O0 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      working-directory: build
      run: ./banking_test
    
    - name: Collect coverage
      working-directory: build
      run: |
        lcov --capture --directory . --output-file coverage.full.info \
             --ignore-errors unused,mismatch,gcov
        lcov --extract coverage.full.info \
             "$(pwd)/../Account.cpp" \
             "$(pwd)/../Transaction.cpp" \
             --output-file coverage.info \
             --ignore-errors unused
        lcov --list coverage.info
    
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: build/coverage.info
        github-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-error: false
